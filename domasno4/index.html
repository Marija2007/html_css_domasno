<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <div class="image-wrapper">
      <img src="CARTIER WATCH.avif" alt="Tank Française Watch" />
      <button class="wishlist-btn">♡</button>
      <button class="next-btn">›</button>
    </div>

    <div class="card-body">
      <div class="card-title">Tank Française Watch</div>
      <div class="card-desc">Medium model, quartz movement, yellow gold,...</div>
      <div class="card-price">$37,100</div>
      <button class="discover-btn">Discover</button>
    </div>
  </div>

</body>
</html>
