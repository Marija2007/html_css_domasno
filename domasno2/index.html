<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h2>Table with colspan and rowspan</h2>
    <table border="1">
            <tr>
                <th rowspan="3">Day</th>
                <th colspan="3">Exam</th>
            </tr>
            <tr>
                <th colspan="2">Schedule</th>
                <th rowspan="2">Topics</th>
            </tr>
            <tr>
                <th>Start</th>
                <th>End</th>
            </tr>
        <tbody>
            <tr>
                <td rowspan="2">Monday</td>
                <td rowspan="2">8:00AM</td>
                <td rowspan="2">5:00PM</td>
                <td>HTML</td>
            </tr>
            <tr>
                <td>CSS</td>
            </tr>
            <tr>
                <td rowspan="2">Tuesday</td>
                <td>8:00AM</td>
                <td>12:00PM</td>
                <td>C++</td>
            </tr>
            <tr>
                <td>12:00PM</td>
                <td>5:00PM</td>
                <td>Java</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td colspan="2" style="text-align: center;">12:00PM</td>
                <td>Result</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
